function biasV(b){if(!b||!b.daily||!b.h4||!b.h1)return{tier:null,tn:'Z',tx:'Mark all 3 TFs'};const v=[b.daily,b.h4,b.h1];if(v.every(x=>x==='Bull'))return{tier:'A+',tn:'E',tx:'A+ ALIGNED — Hunt longs from discount POI'};if(v.every(x=>x==='Bear'))return{tier:'A+',tn:'R',tx:'A+ ALIGNED — Hunt shorts from premium POI'};const bu=v.filter(x=>x==='Bull').length,be=v.filter(x=>x==='Bear').length;if(bu===2&&be===0)return{tier:'B',tn:'A',tx:'B — Wait for misaligned TF to flip bullish'};if(be===2&&bu===0)return{tier:'B',tn:'A',tx:'B — Wait for misaligned TF to flip bearish'};return{tier:'C',tn:'Z',tx:'NO TRADE — Conflicting timeframes'}}

</li><li><strong>Pattern check:</strong> Sweep against bias → CHoCH → impulse with bias = A→M→D confirmed.</li></ul></div></div>`;

ss="pl">${lad}</div>${st.pO?`<div class="tx1 tM m3">Today's Open: <span class="fm tB">${parseFloat(st.pO).toFixed(dec)}</span> · Compare to PP for opening bias.</div>`:''}</div><div class="cdB bn"><div class="tB fs mb2">How to use</div><ul class="ts"><li><strong>PP</strong> = magnetic level. Open above PP = bullish bias, below = bearish.</li><li><strong>R1/S1</strong> = first reaction zones. Look for sweep + reversal.</li><li><strong>R2/S2</strong> = strong trending levels. Often hit on news days.</li><li><strong>R3/S3</strong> = extreme zones. Mean-reversion candidates.</li>${st.pM==='camarilla'?'<li><strong>Camarilla R3/S3</strong> = highest-probability reversal levels.</li>':''}</ul></div>`:`<div class="cd es">${I.pivot}<div>Enter High, Low, and Close to compute pivots.</div></div>`}</div></div>`;

function rStats(){if(!st.trades.length)return `<div class="cd es">${I.bar}<div>Log trades to see stats.</div></div>`;const tr=[...st.trades].sort((a,b)=>a.timestamp-b.timestamp);const w=tr.filter(t=>t.result==='Win');const l=tr.filter(t=>t.result==='Loss');const wr=(w.length/tr.length)*100;const tR=tr.reduce((s,t)=>s+(parseFloat(t.rResult)||0),0);const aw=w.length?w.reduce((s,t)=>s+(parseFloat(t.rResult)||0),0)/w.length:0;const al=l.length?l.reduce((s,t)=>s+(parseFloat(t.rResult)||0),0)/l.length:0;const ex=(wr/100)*aw+((100-wr)/100)*al;const pf=al!==0?Math.abs((aw*wr)/(al*(100-wr))):0;let cR=0;const eq=tr.map((t,i)=>{cR+=parseFloat(t.rResult)||0;return{x:i+1,y:cR}});const bp=PAIRS.map(p=>{const tp=tr.filter(t=>t.pair===p);const tw=tp.filter(t=>t.result==='Win').length;const tl=tp.filter(t=>t.result==='Loss').length;const r=tp.reduce((s,t)=>s+(parseFloat(t.rResult)||0),0);return{n:p,t:tp.length,wr:(tw+tl)?Math.round((tw/(tw+tl))*100):0,r}}).filter(p=>p.t>0);const sm={};tr.forEach(t=>{const k=t.session||'Unknown';if(!sm[k])sm[k]={n:k,t:0,w:0,r:0};sm[k].t++;if(t.result==='Win')sm[k].w++;sm[k].r+=parseFloat(t.rResult)||0});const bs=Object.values(sm);const eqC=(()=>{if(eq.length<2)return '<div class="tx1 tD">Need 2+ trades.</div>';const W=600,H=200,P=30;const mn=Math.min(0,...eq.map(d=>d.y));const mx=Math.max(0,...eq.map(d=>d.y));const rg=(mx-mn)||1;const xs=(W-2*P)/Math.max(1,eq.length-1);const pts=eq.map((d,i)=>`${P+i*xs},${H-P-((d.y-mn)/rg)*(H-2*P)}`).join(' ');const z=H-P-((0-mn)/rg)*(H-2*P);const ap=`${P},${z} ${pts} ${P+(eq.length-1)*xs},${z}`;return `<svg viewBox="0 0 ${W} ${H}" class="csv" preserveAspectRatio="xMidYMid meet"><line x1="${P}" y1="${z}" x2="${W-P}" y2="${z}" class="gl1"/><polygon points="${ap}" class="la"/><polyline points="${pts}" class="ln"/><text x="${P}" y="${P-8}" class="at">Cumulative R</text><text x="${P}" y="${z-4}" class="at">0</text><text x="${P}" y="${P+4}" class="at">${mx.toFixed(1)}</text><text x="${P}" y="${H-P+12}" class="at">${mn.toFixed(1)}</text></svg>`})();const sC=(()=>{if(!bs.length)return'';const W=600,H=220,P=35;const mr=Math.max(.1,...bs.map(d=>Math.abs(d.r)));const bw=(W-2*P)/bs.length*.7;const gp=(W-2*P)/bs.length*.3;const z=H/2;return `<svg viewBox="0 0 ${W} ${H}" class="csv" preserveAspectRatio="xMidYMid meet"><line x1="${P}" y1="${z}" x2="${W-P}" y2="${z}" class="ax"/>${bs.map((d,i)=>{const x=P+i*(bw+gp)+gp/2;const bh=Math.abs(d.r)/mr*(H/2-P);const y=d.r>=0?z-bh:z;return `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" class="${d.r>=0?'bp':'bn1'}" rx="3"/><text x="${x+bw/2}" y="${z+16}" text-anchor="middle" class="at">${d.n}</text><text x="${x+bw/2}" y="${d.r>=0?y-4:y+bh+12}" text-anchor="middle" class="at" style="font-weight:bold">${d.r.toFixed(1)}R</text>`}).join('')}</svg>`})();const pC=(()=>{const tt=tr.length;const be=tr.filter(t=>t.result==='BE').length;const dt=[{n:'W',v:w.length,c:'var(--em)'},{n:'L',v:l.length,c:'var(--ro)'},{n:'BE',v:be,c:'var(--dm)'}].filter(d=>d.v>0);const cx=80,cy=80,r=60;let ac=-Math.PI/2;const seg=dt.map(d=>{const an=(d.v/tt)*Math.PI*2;const x1=cx+r*Math.cos(ac),y1=cy+r*Math.sin(ac);const x2=cx+r*Math.cos(ac+an),y2=cy+r*Math.sin(ac+an);const lg=an>Math.PI?1:0;const pa=`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${lg} 1 ${x2} ${y2} Z`;ac+=an;return `<path d="${pa}" fill="${d.c}"/>`}).join('');return `<svg viewBox="0 0 250 160" class="csv">${seg}${dt.map((d,i)=>`<rect x="170" y="${30+i*25}" width="12" height="12" fill="${d.c}" rx="2"/><text x="190" y="${40+i*25}" class="at" style="font-size:12px">${d.n}: ${d.v}</text>`).join('')}</svg>`})();return `<div class="sc"><h2>Performance Stats</h2><div class="gd mg4 g2m"><div class="tl1"><div class="tlb">Total</div><div class="tlv">${tr.length}</div></div><div class="tl1"><div class="tlb">Win Rate</div><div class="tlv ${wr>=50?'po':'ne'}">${wr.toFixed(1)}%</div></div><div class="tl1"><div class="tlb">Total R</div><div class="tlv ${tR>=0?'po':'ne'}">${tR>0?'+':''}${tR.toFixed(2)}R</div></div><div class="tl1"><div class="tlb">Expectancy</div><div class="tlv ${ex>=0?'po':'ne'}">${ex.toFixed(2)}R</div></div></div><div class="cd p5"><div class="fmd mb3">Equity Curve</div>${eqC}</div><div class="gd mg2"><div class="cd p5"><div class="fmd mb3">Win/Loss</div>${pC}</div><div class="cd p5"><div class="fmd mb3">Edge Math</div><div class="fl fc1 g3x"><div class="fl jb"><span class="tM">Avg Win</span><span class="fm tE fs">+${aw.toFixed(2)}R</span></div><div class="fl jb"><span class="tM">Avg Loss</span><span class="fm tR fs">${al.toFixed(2)}R</span></div><div class="fl jb"><span class="tM">Profit Factor</span><span class="fm fs">${pf.toFixed(2)}</span></div><div class="fl jb"><span class="tM">Wins</span><span class="fm">${w.length}</span></div><div class="fl jb"><span class="tM">Losses</span><span class="fm">${l.length}</span></div></div></div></div><div class="cd p5"><div class="fmd mb3">By Pair</div><div class="gd mg3 g2m">${bp.map(p=>`<div class="cd p4"><div class="fl jb"><span class="fmd">${p.n}</span><span class="fm ${p.r>=0?'tE':'tR'} fs">${p.r>0?'+':''}${p.r.toFixed(2)}R</span></div><div class="tx1 tD m1">${p.t} trades · ${p.wr}% WR</div></div>`).join('')}</div></div><div class="cd p5"><div class="fmd mb3">By Session — R Captured</div>${sC}</div></div>`}

function rSheet(){
  const today=new Date().toLocaleDateString('en-US',{timeZone:'Asia/Manila',weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const cs=st.cs||{};const pb=fundBias(st.fund);const piv=pivots(st.pH,st.pL,st.pC,st.pM);const inf=PI[st.cPair];const ra=(st.account*st.risk)/100;const lot=st.cSL?ra/(st.cSL*inf.pp):0;const sc=scSum();const az=st.zones.filter(z=>z.status==='Active');const pd=PI[st.pPair].d;
  return `<div class="sc"><div class="fl jb fw g3x np is"><div><h2>Daily Cheat Sheet — Auto-Summary</h2><p class="mt">Pulled live from Bias Board, Active Zones, Pivots, Score, Calc, Fundamentals. Plan & reflection are editable & auto-saved.</p></div><div class="fl g2x ic"><span class="sp"><span class="dt"></span>Auto-save on</span><button class="bt btB" onclick="window.print()">${I.printer} Print / PDF</button></div></div><div class="cd p5 pra" style="background:#fff;color:#000"><div class="bb2 mb3" style="border-color:#999;border-bottom:2px solid #333"><div class="fl jb fw"><span class="t2x fb" style="color:#000">SNIPER DESK</span><span class="tx1" style="color:#666">${today}</span></div><div class="tx1" style="color:#666">${st.user||'Trader'} · 5 pairs · ICT/SMC · PHT</div><div class="tx1" style="color:#666;margin-top:.25rem">Account: $${st.account.toLocaleString()} · Risk: ${st.risk}%/trade · Risk-$: $${ra.toFixed(2)}</div></div><div class="mb4"><div class="fb uc mb2">1. Bias Grid (from Bias Board)</div><table style="border:1px solid #999"><thead><tr style="background:#f0f0f0"><th style="border:1px solid #999;padding:.4rem">Pair</th><th style="border:1px solid #999;padding:.4rem">Daily</th><th style="border:1px solid #999;padding:.4rem">4H</th><th style="border:1px solid #999;padding:.4rem">1H</th><th style="border:1px solid #999;padding:.4rem">Tier</th><th style="border:1px solid #999;padding:.4rem">Composite</th></tr></thead><tbody>${PAIRS.map(p=>{const b=st.bias[p]||{};const v=biasV(b);const t=techDir(p);const fd=st.fund.length>0?pb[p].dir:null;const cv=comp(t,fd);return `<tr><td style="border:1px solid #999;padding:.4rem;font-weight:bold">${p}</td><td style="border:1px solid #999;padding:.4rem">${b.daily||'—'}</td><td style="border:1px solid #999;padding:.4rem">${b.h4||'—'}</td><td style="border:1px solid #999;padding:.4rem">${b.h1||'—'}</td><td style="border:1px solid #999;padding:.4rem;font-weight:bold">${v.tier||'—'}</td><td style="border:1px solid #999;padding:.4rem;font-weight:bold">${cv.l}</td></tr>`}).join('')}</tbody></table></div>${st.fund.length?`<div class="mb4"><div class="fb uc mb2">2. Fundamental Events (from News)</div><ul class="tx1">${st.fund.map(e=>`<li><strong>[${e.folder.toUpperCase()}]</strong> ${e.currency} · ${esc(e.name)} → ${e.direction}</li>`).join('')}</ul></div>`:''}${az.length?`<div class="mb4"><div class="fb uc mb2">3. Active Sniper Zones (${az.length})</div><table style="border:1px solid #999"><thead><tr style="background:#f0f0f0"><th style="border:1px solid #999;padding:.3rem">Pair</th><th style="border:1px solid #999;padding:.3rem">Dir</th><th style="border:1px solid #999;padding:.3rem">Type</th><th style="border:1px solid #999;padding:.3rem">Entry</th><th style="border:1px solid #999;padding:.3rem">SL</th><th style="border:1px solid #999;padding:.3rem">TP1</th><th style="border:1px solid #999;padding:.3rem">R</th></tr></thead><tbody>${az.map(z=>{const dt=z.entry-z.sl;const r=z.tp1&&dt!==0?Math.abs((z.tp1-z.entry)/dt).toFixed(1):'—';return `<tr><td style="border:1px solid #999;padding:.3rem">${z.pair}</td><td style="border:1px solid #999;padding:.3rem">${z.direction}</td><td style="border:1px solid #999;padding:.3rem">${esc(z.kind)}</td><td style="border:1px solid #999;padding:.3rem;font-family:monospace">${z.entry}</td><td style="border:1px solid #999;padding:.3rem;font-family:monospace">${z.sl}</td><td style="border:1px solid #999;padding:.3rem;font-family:monospace">${z.tp1||'—'}</td><td style="border:1px solid #999;padding:.3rem">${r}R</td></tr>`}).join('')}</tbody></table></div>`:''}${piv?`<div class="mb4"><div class="fb uc mb2">4. Pivot Levels (${st.pPair} · ${st.pM})</div><div class="tx1" style="font-family:monospace">${Object.entries(piv).map(([k,v])=>`<strong>${k}:</strong> ${v.toFixed(pd)}`).join(' · ')}</div>${st.pO?`<div class="tx1" style="margin-top:.25rem"><strong>Today's Open:</strong> ${parseFloat(st.pO).toFixed(pd)}</div>`:''}</div>`:''}<div class="mb4"><div class="fb uc mb2">5. Position Size (from Calc)</div><div class="tx1">$${st.account.toLocaleString()} @ ${st.risk}% risk = <strong>$${ra.toFixed(2)}</strong> risk-dollars · SL ${st.cSL} ${st.cPair==='XAU/USD'?'dollars':'pips'} on ${st.cPair} → <strong style="color:#c2410c">${lot.toFixed(3)} lots</strong> (${(lot*10).toFixed(2)} mini · ${(lot*100).toFixed(0)} micro)</div></div><div class="mb4"><div class="fb uc mb2">6. Entry Score (today)</div><div class="tx1">Score: <strong>${sc.s}/12</strong> · Grade: <strong>${sc.g}</strong> · Verdict: <strong>${sc.v}</strong></div></div><div class="mb4"><div class="fb uc mb2">7. Today's Plan / Notes (editable)</div><textarea class="cst" oninput="setCS('plan',this.value)" placeholder="Write your plan: which pairs are A+, where you'll enter, what news to avoid...">${esc(cs.plan||'')}</textarea></div><div class="mb4"><div class="fb uc mb2">8. Killzones (PHT)</div><div class="gd g3 tx1"><div><strong>London KZ:</strong> 3:00-6:00 PM</div><div><strong>NY KZ:</strong> 8:30-11:00 PM</div><div><strong>Overlap:</strong> 11 PM-12 AM</div></div></div><div class="mb4"><div class="fb uc mb2">9. Non-Negotiables</div><ol class="tx1">${RULES.map(r=>`<li>${r}</li>`).join('')}</ol></div><div style="border-top:1px solid #999;padding-top:.5rem"><div class="fb uc mb2 tx1">10. End-of-Day Reflection (editable)</div><textarea class="cst" oninput="setCS('reflection',this.value)" placeholder="Did I follow the plan? What worked? What to adjust tomorrow?">${esc(cs.reflection||'')}</textarea></div></div></div>`;
}

consent) will fire-and-forget POST email + username on registration.</p></div><div class="cd p5"><div class="fmd mb3">Backup & Restore</div><p class="ts tM mb3">Export everything as JSON. Import on another device or browser.</p><div class="fl g2x fw"><button class="bt btB" onclick="exBk()">${I.download} Export Full Backup</button><button class="bt btO" onclick="document.getElementById('json-imp').click()">${I.upload} Import Backup</button><input type="file" id="json-imp" accept=".json" style="display:none" onchange="imBk(event)"/></div></div><div class="cd p5"><div class="fmd mb3">CSV Export/Import (Trades only)</div><div class="fl g2x fw"><button class="bt btO" onclick="exTrCSV()">${I.download} Export CSV</button><button class="bt btO" onclick="document.getElementById('csv-imp2').click()">${I.upload} Import CSV</button><input type="file" id="csv-imp2" accept=".csv" style="display:none" onchange="imTrCSV(event)"/></div></div><div class="cdR bn"><div class="fs tR mb2 fl ic g2x">${I.alert} Danger Zone</div><p class="ts mb3">Permanently delete data. Export a backup first.</p><div class="fl g2x fw"><button class="bt btR bts" onclick="cClrTr()">Clear All Trades</button><button class="bt btR bts" onclick="cClrZ()">Clear All Zones</button><button class="bt btR bts" onclick="cClrAll()">Clear Everything</button></div></div><div class="cd p5"><div class="fmd mb3">About</div><p class="ts tM">Sniper Desk v2 — ICT/SMC trading assistant for Philippine timezone traders. All data stays in your browser.</p><p class="tx1 tD m3">⚠️ Data is per-browser. Use Export Backup regularly.</p></div></div>`}

function rMod(){if(!st.modal)return'';const m=st.modal;return `<div class="mbk" onclick="cMod(event)"><div class="md" onclick="event.stopPropagation()"><div class="mdt">${esc(m.t)}</div><p class="ts tM mb3">${esc(m.m)}</p><div class="fl g2x" style="justify-content:flex-end"><button class="bt btO" onclick="cMod()">Cancel</button><button class="bt btR" onclick="${m.cf}">${esc(m.cl||'Confirm')}</button></div></div></div>`}

function render(){
  const a=document.activeElement;
  const fi=(a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA')&&a.id)?{id:a.id,ss:a.selectionStart,se:a.selectionEnd}:null;
  document.getElementById('lr').innerHTML=rLock();
  if(!st.authed){document.getElementById('rt').innerHTML='';document.getElementById('md').innerHTML=rMod();setTimeout(()=>{const i=document.getElementById('lk_p')||document.getElementById('lk_u')||document.getElementById('lk_fe');if(i)i.focus()},50);return}
  let body='';
  switch(st.tab){
    case 'dash':body=rDash();break;
    case 'bias':body=rBias();break;
    case 'play':body=rPlay();break;
    case 'fib':body=rFib();break;
    case 'pivot':body=rPiv();break;
    case 'kz':body=rKZ();break;
    case 'zones':body=rZones();break;
    case 'score':body=rScore();break;
    case 'calc':body=rCalc();break;
    case 'news':body=rNews();break;
    case 'journal':body=rJourn();break;
    case 'stats':body=rStats();break;
    case 'sheet':body=rSheet();break;
    case 'rules':body=rRules();break;
    case 'settings':body=rSet();break;
  }
  document.getElementById('rt').innerHTML=rHead()+'<div class="mn"><div class="ct">'+body+'</div></div><footer>Educational tool. Not financial advice. Trade your plan, log every trade, respect your stops.</footer>';
  document.getElementById('md').innerHTML=rMod();
  if(fi){const el=document.getElementById(fi.id);if(el){el.focus();try{el.setSelectionRange(fi.ss,fi.se)}catch(e){}}}
  tick();
}

window.saveZ=function(){const e=parseFloat(document.getElementById('zf_e').value);const s=parseFloat(document.getElementById('zf_s').value);if(!e||!s){toast('Entry and SL required','er');return}st.zones.unshift({id:Date.now(),timestamp:Date.now(),pair:document.getElementById('zf_p').value,direction:document.getElementById('zf_d').value,kind:document.getElementById('zf_k').value,entry:e,sl:s,tp1:parseFloat(document.getElementById('zf_t1').value)||0,tp2:parseFloat(document.getElementById('zf_t2').value)||0,tp3:parseFloat(document.getElementById('zf_t3').value)||0,notes:document.getElementById('zf_n').value,status:'Active',date:new Date().toLocaleDateString('en-US',{timeZone:'Asia/Manila',month:'short',day:'numeric'})});lS('sd_zones',st.zones);st.sZ=false;render();toast('Zone saved','ss')};
window.upZ=function(id,s){const z=st.zones.find(z=>z.id===id);if(z){z.status=s;lS('sd_zones',st.zones);render()}};
window.delZ=function(id){st.zones=st.zones.filter(z=>z.id!==id);lS('sd_zones',st.zones);render()};

window.exTrCSV=function(){if(!st.trades.length){toast('No trades','er');return}const h=['date','pair','direction','session','setup','dailyBias','h4Bias','h1Bias','entry','sl','tp','exit','confluences','result','rResult','emotion','notes'];const rs=st.trades.map(t=>h.map(x=>{const v=t[x]==null?'':String(t[x]);return v.includes(',')||v.includes('"')||v.includes('\n')?`"${v.replace(/"/g,'""')}"`:v}).join(','));const csv=[h.join(','),...rs].join('\n');const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`sniper-trades-${tk()}.csv`;a.click();URL.revokeObjectURL(u);toast('Exported '+st.trades.length+' trades','ss')};
window.imTrCSV=function(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const ls=e.target.result.split(/\r?\n/).filter(x=>x.trim());if(ls.length<2){toast('Empty','er');return}const h=pCSV(ls[0]);const tr=[];for(let i=1;i<ls.length;i++){const v=pCSV(ls[i]);const t={id:Date.now()+i,timestamp:Date.now()+i};h.forEach((x,k)=>{let val=v[k]||'';if(['entry','sl','tp','exit','rResult'].includes(x))val=parseFloat(val)||0;if(x==='confluences')val=parseInt(val)||0;t[x]=val});if(!t.date)t.date=new Date().toLocaleDateString('en-US',{timeZone:'Asia/Manila',month:'short',day:'numeric',year:'numeric'});tr.push(t)}st.trades=tr.concat(st.trades);lS('sd_trades',st.trades);render();toast('Imported '+tr.length+' trades','ss')}catch(x){toast('Import failed','er')}};r.readAsText(f);ev.target.value=''};
function pCSV(l){const o=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(q){if(ch==='"'&&l[i+1]==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}else{if(ch==='"')q=true;else if(ch===','){o.push(c);c=''}else c+=ch}}o.push(c);return o}

window.exBk=function(){const bk={version:'2.1',exportDate:new Date().toISOString(),user:st.user,email:st.email,optIn:st.optIn,trades:st.trades,zones:st.zones,account:st.account,risk:st.risk,theme:st.theme,bias:lG('sd_bias_'+tk(),{}),fund:lG('sd_fund_'+tk(),[]),cs:lG('sd_cs_'+tk(),{}),score:lG('sd_score_'+tk(),{}),pivot:lG('sd_pivot',{}),calc:lG('sd_calc',{})};const b=new Blob([JSON.stringify(bk,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`sniper-backup-${tk()}.json`;a.click();URL.revokeObjectURL(u);toast('Backup exported','ss')};
window.imBk=function(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.user!=null)lS('sd_user',d.user);if(d.email!=null)lS('sd_email',d.email);if(d.optIn!=null)lS('sd_optin',d.optIn);if(d.trades)lS('sd_trades',d.trades);if(d.zones)lS('sd_zones',d.zones);if(d.account!=null)lS('sd_account',d.account);if(d.risk!=null)lS('sd_risk',d.risk);if(d.bias)lS('sd_bias_'+tk(),d.bias);if(d.fund)lS('sd_fund_'+tk(),d.fund);if(d.cs)lS('sd_cs_'+tk(),d.cs);if(d.score)lS('sd_score_'+tk(),d.score);if(d.pivot)lS('sd_pivot',d.pivot);if(d.calc)lS('sd_calc',d.calc);load();render();toast('Restored','ss')}catch(x){toast('Invalid file','er')}};r.readAsText(f);ev.target.value=''};

window.doClrAll=function(){Object.keys(localStorage).forEach(k=>{if(k.startsWith('sd_')&&!['sd_pwhash','sd_user','sd_email','sd_optin','sd_theme'].includes(k))localStorage.removeItem(k)});st.trades=[];st.zones=[];st.bias={};st.fund=[];st.cs={};st.score={};st.account=1000;st.risk=1;st.cSL=20;st.rE='';st.rS='';st.r1='';st.r2='';st.r3='';st.pH='';st.pL='';st.pC='';st.pO='';st.modal=null;render();toast('All trading data cleared')};
