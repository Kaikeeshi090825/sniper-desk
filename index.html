  --fuchsia: #d946ef; --fuchsia-light: #e879f9;

:root[data-theme="light"] {

  --text: #18181b; --muted: #52525b; --dim: #71717a;

function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch (e) { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

function loadState() {

  document.documentElement.setAttribute('data-theme', state.theme);
}

// ──────────── Computed ────────────
function getSession(mins) {
  if (mins >= 540 && mins < 1230) {
    if (mins >= 900 && mins < 1080) return { name: 'London Killzone', priority: 'high' };
    if (mins >= 540 && mins < 780) return { name: 'Asian / Sydney-Tokyo', priority: 'low' };
    return { name: 'Pre-NY Lull', priority: 'low' };
  }
  if (mins >= 1230 && mins < 1380) return { name: 'NY Killzone — PRIME', priority: 'prime' };
  if (mins >= 1380 || mins < 60) return { name: 'NY/London Overlap', priority: 'prime' };
  if (mins >= 60 && mins < 240) return { name: 'NY PM', priority: 'mid' };
  return { name: 'Off Hours', priority: 'low' };
}

function computeFundamentalBias(events) {
  const weights = { red: 3, orange: 1.5, yellow: 0.5 };
  const dirVal = { Bullish: 1, Bearish: -1, Neutral: 0 };
  const cur = {};
  events.forEach(e => {
    if (!e.currency || !e.direction) return;
    cur[e.currency] = (cur[e.currency] || 0) + (weights[e.folder] || 0) * (dirVal[e.direction] || 0);
  });
  const out = {};
  PAIRS.forEach(pair => {
    const info = PAIR_INFO[pair];
    const bs = cur[info.base] || 0;
    const qs = cur[info.quote] || 0;
    let net = bs - qs;
    if (pair === 'XAU/USD') {
      const riskOff = events.filter(e => e.folder === 'red' && e.theme === 'risk-off').length * 0.5;
      net = -qs + riskOff + (cur['XAU'] || 0);
    }
    let verdict = 'NEUTRAL', dir = 'Neutral';
    if (net >= 2) { verdict = 'STRONG LONG'; dir = 'Long'; }
    else if (net >= 0.5) { verdict = 'LEAN LONG'; dir = 'Long-lean'; }
    else if (net <= -2) { verdict = 'STRONG SHORT'; dir = 'Short'; }
    else if (net <= -0.5) { verdict = 'LEAN SHORT'; dir = 'Short-lean'; }
    out[pair] = { score: net, verdict, dir };
  });
  return out;
}

function resolveTechDir(pair) {
  const b = state.bias[pair];
  if (!b || !b.daily || !b.h4 || !b.h1) return null;
  const v = [b.daily, b.h4, b.h1];
  if (v.every(x => x === 'Bull')) return 'Long';
  if (v.every(x => x === 'Bear')) return 'Short';
  const bulls = v.filter(x => x === 'Bull').length;
  const bears = v.filter(x => x === 'Bear').length;
  if (bulls === 2 && bears === 0) return 'Long-lean';
  if (bears === 2 && bulls === 0) return 'Short-lean';
  return 'Neutral';
}

function compositeVerdict(tech, fund) {
  if (!tech && !fund) return { tone: 'zinc', label: 'NO DATA', detail: 'Mark bias + fundamentals.' };
  if (!tech) return { tone: 'zinc', label: 'NEED TECH', detail: 'Mark Daily/4H/1H on Bias Board.' };
  if (!fund) return { tone: 'zinc', label: 'NEED FUND', detail: 'Log events on News tab.' };
  const longSet = ['Long', 'Long-lean'], shortSet = ['Short', 'Short-lean'];
  const tL = longSet.includes(tech), tS = shortSet.includes(tech);
  const fL = longSet.includes(fund), fS = shortSet.includes(fund);
  if (tech === 'Long' && fund === 'Long') return { tone: 'emerald', label: 'A+ LONG', detail: 'Both strong long. Trade longs aggressively.' };
  if (tech === 'Short' && fund === 'Short') return { tone: 'rose', label: 'A+ SHORT', detail: 'Both strong short. Trade shorts aggressively.' };
  if (tL && fL) return { tone: 'emerald', label: 'A LONG', detail: 'Both lean long.' };
  if (tS && fS) return { tone: 'rose', label: 'A SHORT', detail: 'Both lean short.' };
  if ((tL && fS) || (tS && fL)) return { tone: 'rose', label: 'CONFLICT', detail: 'Tech & Fund disagree. NO TRADE.' };
  if (tech === 'Neutral' && fund !== 'Neutral') return { tone: 'amber', label: 'FUND ONLY', detail: 'Wait for tech to confirm.' };
  if (fund === 'Neutral' && tech !== 'Neutral') return { tone: 'amber', label: 'TECH ONLY', detail: 'No fundamental tailwind.' };
  return { tone: 'zinc', label: 'NEUTRAL', detail: 'No clear edge.' };
}

  const phtDate = now.toLocaleDateString('en-US', { timeZone: 'Asia/Manila', weekday: 'short', month: 'short', day: 'numeric' });

// ──────────── Killzones ────────────

  const h = parseInt((phtParts.find(p => p.type === 'hour') || {}).value || '0');
  const m = parseInt((phtParts.find(p => p.type === 'minute') || {}).value || '0');
  const mins = h * 60 + m;

  const zones = [
    { name: 'Sydney/Tokyo', start: 5*60, end: 13*60, label: '5:00 AM - 1:00 PM', priority: 'low', note: 'AUD range builds.', pair: 'AUD' },
    { name: 'Pre-London Lull', start: 13*60, end: 15*60, label: '1:00 - 3:00 PM', priority: 'low', note: 'Plan, prep. No entries.', pair: '—' },
    { name: 'London Killzone', start: 15*60, end: 18*60, label: '3:00 - 6:00 PM', priority: 'high', note: 'Judas swing. GBP/EUR primary.', pair: 'GBP, EUR, AUD' },
    { name: 'London Lunch', start: 18*60, end: 20*60+30, label: '6:00 - 8:30 PM', priority: 'low', note: 'Skip unless A+.', pair: 'Caution' },
    { name: 'NY Killzone', start: 20*60+30, end: 23*60, label: '8:30 - 11:00 PM', priority: 'prime', note: 'Sweep + FVG model.', pair: 'All pairs' },
    { name: 'NY/London Overlap', start: 23*60, end: 24*60, label: '11:00 PM - 12:00 AM', priority: 'prime', note: 'London close overlap.', pair: 'All pairs' },
    { name: 'NY PM', start: 0, end: 4*60, label: '12:00 - 4:00 AM', priority: 'mid', note: 'Continuation only.', pair: 'XAU, JPY, AUD' },
  ];

  return `
    <div class="section">
      <h2>Killzones — Manila Time (PHT)</h2>
      <div class="flex flex-col gap-3">
        ${zones.map(z => {
          const active = z.start < z.end ? (mins >= z.start && mins < z.end) : (mins >= z.start || mins < z.end);
          return `
            <div class="kz-card card-${z.priority === 'prime' ? 'fuchsia' : z.priority === 'high' ? 'emerald' : z.priority === 'mid' ? 'amber' : ''} ${active ? 'active' : ''}">
              <div class="flex justify-between flex-wrap gap-3">
                <div>
                  <div class="font-medium flex items-center gap-2">${z.name}${active ? `<span class="kz-active-tag">LIVE</span>` : ''}</div>
                  <div class="text-sm text-muted mt-1">${z.label}</div>
                </div>
                <div class="text-xs text-muted" style="padding:0.25rem 0.5rem;background:var(--bg);border-radius:0.25rem;border:1px solid var(--border);align-self:flex-start">${z.pair}</div>
              </div>
              <div class="text-sm mt-3">${z.note}</div>

          `;
        }).join('')}

}

// ──────────── Risk Calc ────────────
function renderRiskCalc() {
  const pair = state.calcPair || 'GBP/USD';
  const slDist = state.calcSL || 20;
  const info = PAIR_INFO[pair];
  const riskAmt = (state.account * state.risk) / 100;
  const lots = riskAmt / (slDist * info.perPip);

  return `
    <div class="section">
      <h2>Position Size Calculator</h2>
      <div class="card p-5">
        <div class="grid md-grid-2 gap-3">
          <div class="input-group"><label>Account ($)</label><input class="input font-mono text-lg" type="number" value="${state.account}" oninput="setAccount(this.value)" /></div>
          <div class="input-group"><label>Risk %</label><input class="input font-mono text-lg" type="number" step="0.25" value="${state.risk}" oninput="setRisk(this.value)" /></div>
          <div class="input-group"><label>Pair</label><select class="input" onchange="setCalcPair(this.value)">${PAIRS.map(p => `<option ${p === pair ? 'selected' : ''}>${p}</option>`).join('')}</select></div>
          <div class="input-group"><label>SL Distance (${pair === 'XAU/USD' ? 'dollars' : 'pips'})</label><input class="input font-mono text-lg" type="number" value="${slDist}" oninput="setCalcSL(this.value)" /></div>
        </div>
      </div>
      <div class="grid md-grid-3 grid-2-mobile">
        <div class="tile"><div class="tile-label">Risk $</div><div class="tile-value">$${riskAmt.toFixed(2)}</div></div>
        <div class="tile" style="background:rgba(16,185,129,0.05);border-color:rgba(16,185,129,0.3)"><div class="tile-label" style="color:var(--emerald)">Position</div><div class="tile-value pos">${lots.toFixed(3)} lots</div><div class="tile-sub">${(lots*10).toFixed(2)} mini · ${(lots*100).toFixed(0)} micro</div></div>
        <div class="tile"><div class="tile-label">Per-Unit</div><div class="tile-value">$${info.perPip}</div></div>
      </div>

      ${renderRRCalc()}
    </div>
  `;
}

function renderRRCalc() {
  const en = parseFloat(state.rrEntry) || NaN;
  const sl = parseFloat(state.rrSL) || NaN;
  const tp1 = parseFloat(state.rrTP1) || NaN;
  const tp2 = parseFloat(state.rrTP2) || NaN;
  const tp3 = parseFloat(state.rrTP3) || NaN;
  const valid = !isNaN(en) && !isNaN(sl) && en !== sl;
  const slDist = valid ? Math.abs(en - sl) : 0;
  const r1 = valid && !isNaN(tp1) ? Math.abs(tp1 - en) / slDist : 0;
  const r2 = valid && !isNaN(tp2) ? Math.abs(tp2 - en) / slDist : 0;
  const r3 = valid && !isNaN(tp3) ? Math.abs(tp3 - en) / slDist : 0;

  let weightedR = 0;
  let totalWeight = 0;
  if (r1 > 0) { weightedR += 0.5 * r1; totalWeight += 0.5; }
  if (r2 > 0) { weightedR += 0.3 * r2; totalWeight += 0.3; }
  if (r3 > 0) { weightedR += 0.2 * r3; totalWeight += 0.2; }
  if (totalWeight > 0 && totalWeight < 1) weightedR = weightedR / totalWeight * (totalWeight + (1 - totalWeight) * 0); // simple weighted

  let weightedColor = 'var(--rose)';
  if (weightedR >= 2) weightedColor = 'var(--emerald)';
  else if (weightedR >= 1) weightedColor = 'var(--amber)';

  return `
    <div class="card-emerald banner mt-4">
      <div class="text-emerald font-semibold mb-3 flex items-center gap-2">${ICONS.dollar} R:R Calculator</div>
      <div class="grid md-grid-3 gap-3 mb-3">
        <div class="input-group"><label>Entry</label><input class="input font-mono" type="number" step="0.00001" value="${state.rrEntry || ''}" oninput="setRR('Entry', this.value)" /></div>
        <div class="input-group"><label style="color:var(--rose)">SL</label><input class="input font-mono" type="number" step="0.00001" value="${state.rrSL || ''}" oninput="setRR('SL', this.value)" /></div>
        <div class="input-group"><label style="color:var(--emerald)">TP1</label><input class="input font-mono" type="number" step="0.00001" value="${state.rrTP1 || ''}" oninput="setRR('TP1', this.value)" /></div>
        <div class="input-group"><label style="color:var(--emerald)">TP2 (optional)</label><input class="input font-mono" type="number" step="0.00001" value="${state.rrTP2 || ''}" oninput="setRR('TP2', this.value)" /></div>
        <div class="input-group"><label style="color:var(--emerald)">TP3 (optional)</label><input class="input font-mono" type="number" step="0.00001" value="${state.rrTP3 || ''}" oninput="setRR('TP3', this.value)" /></div>
      </div>
      ${valid ? `
        <div class="grid md-grid-2 gap-3 mb-2">
          <div class="tile"><div class="tile-label">SL Distance</div><div class="tile-value font-mono">${slDist.toFixed(5)}</div></div>
          <div class="tile"><div class="tile-label">Weighted R (50/30/20)</div><div class="tile-value font-mono" style="color:${weightedColor}">${weightedR.toFixed(2)}R</div></div>
        </div>
        <div class="grid grid-3 gap-2">
          ${tp1 ? `<div class="tile"><div class="tile-label" style="color:var(--emerald)">TP1</div><div class="text-lg font-bold font-mono text-emerald">${r1.toFixed(2)}R</div></div>` : ''}
          ${tp2 ? `<div class="tile"><div class="tile-label" style="color:var(--emerald)">TP2</div><div class="text-lg font-bold font-mono text-emerald">${r2.toFixed(2)}R</div></div>` : ''}
          ${tp3 ? `<div class="tile"><div class="tile-label" style="color:var(--emerald)">TP3</div><div class="text-lg font-bold font-mono text-emerald">${r3.toFixed(2)}R</div></div>` : ''}
        </div>
      ` : '<div class="text-xs text-dim">Enter Entry and SL to see R-multiples.</div>'}

// ──────────── Stats with charts ────────────
function renderStats() {
  if (!state.trades.length) return `<div class="card empty-state">${ICONS.bar}<div>Log trades to see stats and charts.</div></div>`;

  const trades = [...state.trades].sort((a, b) => a.timestamp - b.timestamp);
  const wins = trades.filter(t => t.result === 'Win');
  const losses = trades.filter(t => t.result === 'Loss');
  const wr = (wins.length / trades.length) * 100;
  const totalR = trades.reduce((s, t) => s + (parseFloat(t.rResult) || 0), 0);
  const avgWin = wins.length ? wins.reduce((s, t) => s + (parseFloat(t.rResult) || 0), 0) / wins.length : 0;
  const avgLoss = losses.length ? losses.reduce((s, t) => s + (parseFloat(t.rResult) || 0), 0) / losses.length : 0;
  const expectancy = (wr / 100) * avgWin + ((100 - wr) / 100) * avgLoss;
  const pf = avgLoss !== 0 ? Math.abs((avgWin * wr) / (avgLoss * (100 - wr))) : 0;

  // Equity curve (cumulative R)
  let cumR = 0;
  const equityData = trades.map((t, i) => {
    cumR += parseFloat(t.rResult) || 0;
    return { x: i + 1, y: cumR };
  });

  // By pair
  const byPair = PAIRS.map(p => {
    const tp = trades.filter(t => t.pair === p);
    const tw = tp.filter(t => t.result === 'Win').length;
    const tl = tp.filter(t => t.result === 'Loss').length;
    const r = tp.reduce((s, t) => s + (parseFloat(t.rResult) || 0), 0);
    return { name: p, trades: tp.length, wr: (tw + tl) ? Math.round((tw / (tw + tl)) * 100) : 0, r };
  }).filter(p => p.trades > 0);

  // By session
  const sessionMap = {};
  trades.forEach(t => {
    const k = t.session || 'Unknown';
    if (!sessionMap[k]) sessionMap[k] = { name: k, trades: 0, wins: 0, r: 0 };
    sessionMap[k].trades++;
    if (t.result === 'Win') sessionMap[k].wins++;
    sessionMap[k].r += parseFloat(t.rResult) || 0;
  });
  const bySession = Object.values(sessionMap);

  // SVG line chart for equity curve
  const equityChart = (() => {
    if (equityData.length < 2) return '<div class="text-xs text-dim">Need at least 2 trades for equity curve.</div>';
    const w = 600, h = 200, pad = 30;
    const minY = Math.min(0, ...equityData.map(d => d.y));
    const maxY = Math.max(0, ...equityData.map(d => d.y));
    const range = (maxY - minY) || 1;
    const xStep = (w - 2 * pad) / Math.max(1, equityData.length - 1);
    const points = equityData.map((d, i) => {
      const x = pad + i * xStep;
      const y = h - pad - ((d.y - minY) / range) * (h - 2 * pad);
      return `${x},${y}`;
    }).join(' ');
    const zeroY = h - pad - ((0 - minY) / range) * (h - 2 * pad);
    const areaPoints = `${pad},${zeroY} ${points} ${pad + (equityData.length - 1) * xStep},${zeroY}`;
    return `
      <svg viewBox="0 0 ${w} ${h}" class="chart-svg" preserveAspectRatio="xMidYMid meet">
        <line x1="${pad}" y1="${zeroY}" x2="${w-pad}" y2="${zeroY}" class="grid-line" />
        <polygon points="${areaPoints}" class="line-area" />
        <polyline points="${points}" class="line" />
        <text x="${pad}" y="${pad - 8}" class="axis-text">Cumulative R</text>
        <text x="${pad}" y="${zeroY - 4}" class="axis-text">0</text>
        <text x="${pad}" y="${pad + 4}" class="axis-text">${maxY.toFixed(1)}</text>
        <text x="${pad}" y="${h - pad + 12}" class="axis-text">${minY.toFixed(1)}</text>
      </svg>
    `;
  })();

  // SVG bar chart for by-session
  const sessionChart = (() => {
    if (bySession.length === 0) return '';
    const w = 600, h = 220, pad = 35;
    const maxR = Math.max(0.1, ...bySession.map(d => Math.abs(d.r)));
    const barW = (w - 2 * pad) / bySession.length * 0.7;
    const gap = (w - 2 * pad) / bySession.length * 0.3;
    const zeroY = h / 2;
    return `
      <svg viewBox="0 0 ${w} ${h}" class="chart-svg" preserveAspectRatio="xMidYMid meet">
        <line x1="${pad}" y1="${zeroY}" x2="${w-pad}" y2="${zeroY}" class="axis" />
        ${bySession.map((d, i) => {
          const x = pad + i * (barW + gap) + gap/2;
          const barH = Math.abs(d.r) / maxR * (h/2 - pad);
          const y = d.r >= 0 ? zeroY - barH : zeroY;
          return `
            <rect x="${x}" y="${y}" width="${barW}" height="${barH}" class="${d.r >= 0 ? 'bar-pos' : 'bar-neg'}" rx="2" />
            <text x="${x + barW/2}" y="${zeroY + 16}" text-anchor="middle" class="axis-text">${d.name}</text>
            <text x="${x + barW/2}" y="${d.r >= 0 ? y - 4 : y + barH + 12}" text-anchor="middle" class="axis-text" style="font-weight:bold">${d.r.toFixed(1)}R</text>
          `;
        }).join('')}
      </svg>
    `;
  })();

  // Pie chart for W/L
  const pieChart = (() => {
    const total = trades.length;
    const beCount = trades.filter(t => t.result === 'BE').length;
    const data = [
      { name: 'W', val: wins.length, color: 'var(--emerald)' },
      { name: 'L', val: losses.length, color: 'var(--rose)' },
      { name: 'BE', val: beCount, color: 'var(--dim)' },
    ].filter(d => d.val > 0);
    const cx = 80, cy = 80, r = 60;
    let acc = -Math.PI / 2;
    const segments = data.map(d => {
      const angle = (d.val / total) * Math.PI * 2;
      const x1 = cx + r * Math.cos(acc), y1 = cy + r * Math.sin(acc);
      const x2 = cx + r * Math.cos(acc + angle), y2 = cy + r * Math.sin(acc + angle);
      const large = angle > Math.PI ? 1 : 0;
      const path = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
      acc += angle;
      return `<path d="${path}" fill="${d.color}" />`;
    }).join('');
    return `
      <svg viewBox="0 0 250 160" class="chart-svg">
        ${segments}
        ${data.map((d, i) => `
          <rect x="170" y="${30 + i*25}" width="12" height="12" fill="${d.color}" />
          <text x="190" y="${40 + i*25}" class="axis-text" style="font-size:12px">${d.name}: ${d.val}</text>
        `).join('')}
      </svg>
    `;
  })();

  return `
    <div class="section">
      <h2>Performance Stats</h2>

      <div class="grid md-grid-4 grid-2-mobile">
        <div class="tile"><div class="tile-label">Total</div><div class="tile-value">${trades.length}</div></div>
        <div class="tile"><div class="tile-label">Win Rate</div><div class="tile-value ${wr >= 50 ? 'pos' : 'neg'}">${wr.toFixed(1)}%</div></div>
        <div class="tile"><div class="tile-label">Total R</div><div class="tile-value ${totalR >= 0 ? 'pos' : 'neg'}">${totalR > 0 ? '+' : ''}${totalR.toFixed(2)}R</div></div>
        <div class="tile"><div class="tile-label">Expectancy</div><div class="tile-value ${expectancy >= 0 ? 'pos' : 'neg'}">${expectancy.toFixed(2)}R</div></div>
      </div>

      <div class="card p-5">
        <div class="font-medium mb-3">Equity Curve (Cumulative R)</div>
        ${equityChart}
      </div>

      <div class="grid md-grid-2">
        <div class="card p-5">
          <div class="font-medium mb-3">Win/Loss Distribution</div>
          ${pieChart}
        </div>
        <div class="card p-5">
          <div class="font-medium mb-3">Edge Math</div>
          <div class="flex flex-col gap-3">
            <div class="flex justify-between"><span class="text-muted">Avg Win</span><span class="font-mono text-emerald font-semibold">+${avgWin.toFixed(2)}R</span></div>
            <div class="flex justify-between"><span class="text-muted">Avg Loss</span><span class="font-mono text-rose font-semibold">${avgLoss.toFixed(2)}R</span></div>
            <div class="flex justify-between"><span class="text-muted">Profit Factor</span><span class="font-mono font-semibold">${pf.toFixed(2)}</span></div>
            <div class="flex justify-between"><span class="text-muted">Wins</span><span class="font-mono">${wins.length}</span></div>
            <div class="flex justify-between"><span class="text-muted">Losses</span><span class="font-mono">${losses.length}</span></div>
          </div>
        </div>
      </div>

      <div class="card p-5">
        <div class="font-medium mb-3">By Pair</div>
        <div class="grid md-grid-3 grid-2-mobile">
          ${byPair.map(p => `
            <div class="card p-4">
              <div class="flex justify-between"><span class="font-medium">${p.name}</span><span class="font-mono ${p.r >= 0 ? 'text-emerald' : 'text-rose'} font-semibold">${p.r > 0 ? '+' : ''}${p.r.toFixed(2)}R</span></div>
              <div class="text-xs text-dim mt-1">${p.trades} trades · ${p.wr}% WR</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="card p-5">
        <div class="font-medium mb-3">By Session — R Captured</div>
        ${sessionChart}
      </div>
    </div>
  `;
}

        </div>
        <div class="card p-5">
          <div class="flex items-center gap-2 mb-3 text-amber">${ICONS.alert}<span class="font-medium" style="color:var(--text)">Tilt Triggers — STOP if you feel:</span></div>
          <ul class="text-sm">
            <li>Anger after a loss</li>
            <li>Urgency to make it back</li>
            <li>FOMO on a missed move</li>
            <li>Skipping the checklist "just this once"</li>
            <li>Increasing size after a win</li>
          </ul>
        </div>
      </div>
    </div>
  `;
}

// ──────────── Settings ────────────
function renderSettings() {
  return `
    <div class="section">
      <h2>Settings</h2>

      <div class="card p-5">
        <div class="font-medium mb-3">Appearance</div>
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div>
            <div class="text-sm">Theme</div>
            <div class="text-xs text-dim">Currently: ${state.theme === 'dark' ? 'Dark' : 'Light'}</div>
          </div>
          <button class="btn btn-zinc" onclick="toggleTheme()">${state.theme === 'dark' ? ICONS.sun + 'Switch to Light' : ICONS.moon + 'Switch to Dark'}</button>
        </div>
      </div>

      <div class="card p-5">
        <div class="font-medium mb-3">Backup & Restore</div>
        <p class="text-sm text-muted mb-3">Export all your data (trades, zones, settings) as a JSON file. Import on another device or browser to restore.</p>
        <div class="flex gap-2 flex-wrap">
          <button class="btn btn-zinc" onclick="exportFullBackup()">${ICONS.download} Export Full Backup</button>
          <button class="btn btn-zinc" onclick="document.getElementById('json-import').click()">${ICONS.upload} Import Backup</button>
          <input type="file" id="json-import" accept=".json" style="display:none" onchange="importFullBackup(event)" />
        </div>
      </div>

      <div class="card p-5">
        <div class="font-medium mb-3">CSV Export/Import</div>
        <p class="text-sm text-muted mb-3">Trades only, in CSV format compatible with Google Sheets and Excel.</p>
        <div class="flex gap-2 flex-wrap">
          <button class="btn btn-zinc" onclick="exportTradesCSV()">${ICONS.download} Export Trades CSV</button>
          <button class="btn btn-zinc" onclick="document.getElementById('csv-import-2').click()">${ICONS.upload} Import Trades CSV</button>
          <input type="file" id="csv-import-2" accept=".csv" style="display:none" onchange="importTradesCSV(event)" />
        </div>
      </div>

      <div class="card-rose banner">
        <div class="font-semibold text-rose mb-2 flex items-center gap-2">${ICONS.alert} Danger Zone</div>
        <p class="text-sm mb-3">Permanently delete all your local data. Cannot be undone. Export a backup first if you want to keep anything.</p>
        <div class="flex gap-2 flex-wrap">
          <button class="btn btn-rose btn-sm" onclick="confirmClearTrades()">Clear All Trades</button>
          <button class="btn btn-rose btn-sm" onclick="confirmClearZones()">Clear All Zones</button>
          <button class="btn btn-rose btn-sm" onclick="confirmClearAll()">Clear Everything</button>
        </div>
      </div>

      <div class="card p-5">
        <div class="font-medium mb-3">About</div>
        <p class="text-sm text-muted">Sniper Desk — ICT/SMC trading assistant for Philippine timezone traders. All data is stored in your browser only — nothing is sent to any server. Your data stays private.</p>
        <p class="text-xs text-dim mt-3">⚠️ Data is per-browser. Switching browsers or clearing cache will lose your data. Use Export Backup regularly.</p>
      </div>
    </div>
  `;
}

// ──────────── Modal ────────────
function renderModal() {
  if (!state.modal) return '';
  const m = state.modal;
  return `
    <div class="modal-backdrop" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">${escapeHtml(m.title)}</div>
        <p class="text-sm text-muted mb-3">${escapeHtml(m.message)}</p>
        <div class="flex gap-2 justify-end">
          <button class="btn btn-zinc" onclick="closeModal()">Cancel</button>
          <button class="btn btn-rose" onclick="${m.confirmFn}">${escapeHtml(m.confirmLabel || 'Confirm')}</button>
        </div>
      </div>
    </div>
  `;
}

// ──────────── Main render ────────────
function render() {
  const root = document.getElementById('root');
  let body = '';
  switch (state.tab) {
    case 'dash': body = renderDashboard(); break;
    case 'bias': body = renderBias(); break;
    case 'play': body = renderPlaybook(); break;
    case 'fib': body = renderFibs(); break;
    case 'kz': body = renderKillzones(); break;
    case 'zones': body = renderActiveZones(); break;
    case 'score': body = renderEntryScore(); break;
    case 'calc': body = renderRiskCalc(); break;
    case 'news': body = renderNews(); break;
    case 'journal': body = renderJournal(); break;
    case 'stats': body = renderStats(); break;
    case 'sheet': body = renderCheatSheet(); break;
    case 'rules': body = renderRules(); break;
    case 'settings': body = renderSettings(); break;
  }
  root.innerHTML = renderHeader() + '<div class="main"><div class="container">' + body + '</div></div>' +
    '<footer>Educational tool. Not financial advice. Trade your plan, log every trade, respect your stops.</footer>';
  document.getElementById('modal-root').innerHTML = renderModal();
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ──────────── Event handlers ────────────
window.setTab = function(t) { state.tab = t; state.mobileMenuOpen = false; render(); window.scrollTo(0, 0); };
window.toggleMobileMenu = function() { state.mobileMenuOpen = !state.mobileMenuOpen; render(); };
window.closeMobileMenu = function(e) { if (e && e.target.closest('.mobile-menu-panel')) return; state.mobileMenuOpen = false; render(); };
window.toggleTheme = function() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  lsSet('sd_theme', state.theme);
  document.documentElement.setAttribute('data-theme', state.theme);
  render();
};

window.setBias = function(pair, tf, val) {
  if (!state.bias[pair]) state.bias[pair] = {};
  state.bias[pair][tf] = val;
  lsSet('sd_bias_' + todayKey(), state.bias);
  render();
};

window.toggleScore = function(i) { state.scoreChecked[i] = !state.scoreChecked[i]; render(); };
window.resetScore = function() { state.scoreChecked = {}; render(); };

window.setAccount = function(v) { state.account = parseFloat(v) || 0; lsSet('sd_account', state.account); render(); };
window.setRisk = function(v) { state.risk = parseFloat(v) || 0; lsSet('sd_risk', state.risk); render(); };
window.setCalcPair = function(v) { state.calcPair = v; render(); };
window.setCalcSL = function(v) { state.calcSL = parseFloat(v) || 0; render(); };
window.setRR = function(field, v) { state['rr' + field] = v; render(); };

window.toggleEventForm = function() { state.showEventForm = !state.showEventForm; render(); };
window.saveEvent = function() {
  const name = document.getElementById('ef_name').value.trim();
  if (!name) { showToast('Event name required'); return; }
  state.fundamentals.unshift({
    id: Date.now(),
    folder: document.getElementById('ef_folder').value,
    currency: document.getElementById('ef_currency').value,
    direction: document.getElementById('ef_direction').value,
    name,
    theme: document.getElementById('ef_theme').value,
    notes: document.getElementById('ef_notes').value,
  });
  lsSet('sd_fund_' + todayKey(), state.fundamentals);
  state.showEventForm = false;
  render();
  showToast('Event saved');
};
window.updateEventDir = function(id, dir) {
  const e = state.fundamentals.find(x => x.id === id);
  if (e) { e.direction = dir; lsSet('sd_fund_' + todayKey(), state.fundamentals); render(); }
};
window.deleteEvent = function(id) {
  state.fundamentals = state.fundamentals.filter(e => e.id !== id);
  lsSet('sd_fund_' + todayKey(), state.fundamentals);
  render();
};

window.toggleTradeForm = function() { state.showTradeForm = !state.showTradeForm; render(); };
window.saveTrade = function() {
  const tr = {
    id: Date.now(),
    timestamp: Date.now(),
    pair: document.getElementById('tr_pair').value,
    direction: document.getElementById('tr_direction').value,
    session: document.getElementById('tr_session').value,
    setup: document.getElementById('tr_setup').value,
    dailyBias: document.getElementById('tr_dbias').value,
    h4Bias: document.getElementById('tr_h4bias').value,
    h1Bias: document.getElementById('tr_h1bias').value,
    entry: parseFloat(document.getElementById('tr_entry').value) || 0,
    sl: parseFloat(document.getElementById('tr_sl').value) || 0,
    tp: parseFloat(document.getElementById('tr_tp').value) || 0,
    exit: parseFloat(document.getElementById('tr_exit').value) || 0,
    confluences: parseInt(document.getElementById('tr_conf').value) || 0,
    result: document.getElementById('tr_result').value,
    rResult: parseFloat(document.getElementById('tr_r').value) || 0,
    emotion: document.getElementById('tr_emotion').value,
    notes: document.getElementById('tr_notes').value,
    date: new Date().toLocaleDateString('en-US', { timeZone: 'Asia/Manila', month: 'short', day: 'numeric', year: 'numeric' }),
  };
  state.trades.unshift(tr);
  lsSet('sd_trades', state.trades);
  state.showTradeForm = false;
  render();
  showToast('Trade saved');
};
window.deleteTrade = function(id) {
  state.trades = state.trades.filter(t => t.id !== id);
  lsSet('sd_trades', state.trades);
  render();
};

window.toggleZoneForm = function() { state.showZoneForm = !state.showZoneForm; render(); };
window.setZoneFilter = function(f) { state.zoneFilter = f; render(); };
window.saveZone = function() {
  const entry = parseFloat(document.getElementById('zf_entry').value);
  const sl = parseFloat(document.getElementById('zf_sl').value);
  if (!entry || !sl) { showToast('Entry and SL required'); return; }
  state.zones.unshift({
    id: Date.now(),
    timestamp: Date.now(),
    pair: document.getElementById('zf_pair').value,
    direction: document.getElementById('zf_direction').value,
    kind: document.getElementById('zf_kind').value,
    entry, sl,
    tp1: parseFloat(document.getElementById('zf_tp1').value) || 0,
    tp2: parseFloat(document.getElementById('zf_tp2').value) || 0,
    tp3: parseFloat(document.getElementById('zf_tp3').value) || 0,
    notes: document.getElementById('zf_notes').value,
    status: 'Active',
    date: new Date().toLocaleDateString('en-US', { timeZone: 'Asia/Manila', month: 'short', day: 'numeric' }),
  });
  lsSet('sd_zones', state.zones);
  state.showZoneForm = false;
  render();
  showToast('Zone saved');
};
window.updateZoneStatus = function(id, status) {
  const z = state.zones.find(z => z.id === id);
  if (z) { z.status = status; lsSet('sd_zones', state.zones); render(); }
};
window.deleteZone = function(id) {
  state.zones = state.zones.filter(z => z.id !== id);
  lsSet('sd_zones', state.zones);
  render();
};

// CSV export/import
window.exportTradesCSV = function() {
  if (!state.trades.length) { showToast('No trades to export'); return; }
  const headers = ['date', 'pair', 'direction', 'session', 'setup', 'dailyBias', 'h4Bias', 'h1Bias', 'entry', 'sl', 'tp', 'exit', 'confluences', 'result', 'rResult', 'emotion', 'notes'];
  const rows = state.trades.map(t => headers.map(h => {
    const v = t[h] == null ? '' : String(t[h]);
    return v.includes(',') || v.includes('"') || v.includes('\n') ? `"${v.replace(/"/g, '""')}"` : v;
  }).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sniper-trades-${todayKey()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported ' + state.trades.length + ' trades');
};

window.importTradesCSV = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const text = e.target.result;
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { showToast('CSV is empty'); return; }
      const headers = parseCSVLine(lines[0]);
      const trades = [];
      for (let i = 1; i < lines.length; i++) {
        const vals = parseCSVLine(lines[i]);
        const t = { id: Date.now() + i, timestamp: Date.now() + i };
        headers.forEach((h, idx) => {
          let v = vals[idx] || '';
          if (['entry', 'sl', 'tp', 'exit', 'rResult'].includes(h)) v = parseFloat(v) || 0;
          if (h === 'confluences') v = parseInt(v) || 0;
          t[h] = v;
        });
        if (!t.date) t.date = new Date().toLocaleDateString('en-US', { timeZone: 'Asia/Manila', month: 'short', day: 'numeric', year: 'numeric' });
        trades.push(t);
      }
      state.trades = trades.concat(state.trades);
      lsSet('sd_trades', state.trades);
      render();
      showToast('Imported ' + trades.length + ' trades');
    } catch (err) {
      showToast('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
};

function parseCSVLine(line) {
  const out = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else cur += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { out.push(cur); cur = ''; }
      else cur += c;
    }
  }
  out.push(cur);
  return out;
}

// Full backup
window.exportFullBackup = function() {
  const backup = {
    version: '1.0',
    exportDate: new Date().toISOString(),
    trades: state.trades,
    zones: state.zones,
    account: state.account,
    risk: state.risk,
    theme: state.theme,
    bias: lsGet('sd_bias_' + todayKey(), {}),
    fundamentals: lsGet('sd_fund_' + todayKey(), []),
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sniper-backup-${todayKey()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Full backup exported');
};

window.importFullBackup = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.trades) { state.trades = data.trades; lsSet('sd_trades', state.trades); }
      if (data.zones) { state.zones = data.zones; lsSet('sd_zones', state.zones); }
      if (data.account != null) { state.account = data.account; lsSet('sd_account', state.account); }
      if (data.risk != null) { state.risk = data.risk; lsSet('sd_risk', state.risk); }
      if (data.bias) { state.bias = data.bias; lsSet('sd_bias_' + todayKey(), state.bias); }
      if (data.fundamentals) { state.fundamentals = data.fundamentals; lsSet('sd_fund_' + todayKey(), state.fundamentals); }
      render();
      showToast('Backup restored');
    } catch (err) {
      showToast('Restore failed: invalid file');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
};

// Confirm modals
window.confirmClearTrades = function() {
  state.modal = { title: 'Clear all trades?', message: 'This deletes all logged trades permanently. Export a CSV first if you want to keep them.', confirmLabel: 'Delete All', confirmFn: 'doClearTrades()' };
  render();
};
window.doClearTrades = function() {
  state.trades = [];
  lsSet('sd_trades', []);
  state.modal = null;
  render();
  showToast('All trades cleared');
};
window.confirmClearZones = function() {
  state.modal = { title: 'Clear all zones?', message: 'This deletes all saved sniper zones permanently.', confirmLabel: 'Delete All', confirmFn: 'doClearZones()' };
  render();
};
window.doClearZones = function() {
  state.zones = [];
  lsSet('sd_zones', []);
  state.modal = null;
  render();
  showToast('All zones cleared');
};
window.confirmClearAll = function() {
  state.modal = { title: 'Clear EVERYTHING?', message: 'This wipes all your data: trades, zones, bias, fundamentals, settings. Cannot be undone. Export a backup first!', confirmLabel: 'WIPE ALL DATA', confirmFn: 'doClearAll()' };
  render();
};
window.doClearAll = function() {
  Object.keys(localStorage).forEach(k => { if (k.startsWith('sd_')) localStorage.removeItem(k); });
  state.trades = [];
  state.zones = [];
  state.bias = {};
  state.fundamentals = [];
  state.account = 1000;
  state.risk = 1;
  state.modal = null;
  render();
  showToast('All data cleared');
};
window.closeModal = function(e) {
  if (e && e.target.closest('.modal') && !e.target.classList.contains('modal-backdrop')) return;
  state.modal = null;
  render();
};

// Init
loadState();
render();
setInterval(() => {
  if (state.tab === 'dash' || state.tab === 'kz') render();
}, 1000);
</script>
