<body>
<div id="root"></div>

<script>
'use strict';

// ──────────── State ────────────
const PAIRS = ['GBP/USD', 'XAU/USD', 'AUD/USD'];
let state = {
  tab: 'dash',
  trades: [],
  account: 1000,
  risk: 1,
  bias: {},
  fundamentals: [],
  zones: [],
  scoreChecked: {},
};

// localStorage helpers
function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch (e) { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

function loadState() {
  state.trades = lsGet('sd_trades', []);
  state.account = lsGet('sd_account', 1000);
  state.risk = lsGet('sd_risk', 1);
  state.bias = lsGet('sd_bias_' + todayKey(), {});
  state.fundamentals = lsGet('sd_fund_' + todayKey(), []);
  state.zones = lsGet('sd_zones', []);
}

function todayKey() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Manila' });
}

// ──────────── Computed ────────────
function getSession(mins) {
  if (mins >= 540 && mins < 1230) {
    if (mins >= 900 && mins < 1080) return { name: 'London Killzone', priority: 'high' };
    if (mins >= 540 && mins < 780) return { name: 'Asian / Sydney-Tokyo', priority: 'low' };
    return { name: 'Pre-NY Lull', priority: 'low' };
  }
  if (mins >= 1230 && mins < 1380) return { name: 'NY Killzone — PRIME', priority: 'prime' };
  if (mins >= 1380 || mins < 60) return { name: 'NY/London Overlap', priority: 'prime' };
  if (mins >= 60 && mins < 240) return { name: 'NY PM', priority: 'mid' };
  return { name: 'Off Hours', priority: 'low' };
}

function computeFundamentalBias(events) {
  const weights = { red: 3, orange: 1.5, yellow: 0.5 };
  const dirVal = { Bullish: 1, Bearish: -1, Neutral: 0 };
  const cur = {};
  events.forEach(e => {
    if (!e.currency || !e.direction) return;
    cur[e.currency] = (cur[e.currency] || 0) + (weights[e.folder] || 0) * (dirVal[e.direction] || 0);
  });
  const out = {};
  PAIRS.forEach(pair => {
    let base = 'GBP', quote = 'USD';
    if (pair === 'XAU/USD') base = 'XAU';
    if (pair === 'AUD/USD') base = 'AUD';
    const bs = cur[base] || 0;
    const qs = cur[quote] || 0;
    let net = bs - qs;
    if (pair === 'XAU/USD') {
      const riskOff = events.filter(e => e.folder === 'red' && e.theme === 'risk-off').length * 0.5;
      net = -qs + riskOff + (cur['XAU'] || 0);
    }
    let verdict = 'NEUTRAL', dir = 'Neutral';
    if (net >= 2) { verdict = 'STRONG LONG'; dir = 'Long'; }
    else if (net >= 0.5) { verdict = 'LEAN LONG'; dir = 'Long-lean'; }
    else if (net <= -2) { verdict = 'STRONG SHORT'; dir = 'Short'; }
    else if (net <= -0.5) { verdict = 'LEAN SHORT'; dir = 'Short-lean'; }
    out[pair] = { score: net, verdict, dir };
  });
  return out;
}

function resolveTechDir(pair) {
  const b = state.bias[pair];
  if (!b || !b.daily || !b.h4 || !b.h1) return null;
  const v = [b.daily, b.h4, b.h1];
  if (v.every(x => x === 'Bull')) return 'Long';
  if (v.every(x => x === 'Bear')) return 'Short';
  const bulls = v.filter(x => x === 'Bull').length;
  const bears = v.filter(x => x === 'Bear').length;
  if (bulls === 2 && bears === 0) return 'Long-lean';
  if (bears === 2 && bulls === 0) return 'Short-lean';
  return 'Neutral';
}

function compositeVerdict(tech, fund) {
  if (!tech && !fund) return { tone: 'zinc', label: 'NO DATA', detail: 'Mark bias + fundamentals.' };
  if (!tech) return { tone: 'zinc', label: 'NEED TECH', detail: 'Mark Daily/4H/1H on Bias Board.' };
  if (!fund) return { tone: 'zinc', label: 'NEED FUND', detail: 'Log events on News tab.' };
  const longSet = ['Long', 'Long-lean'], shortSet = ['Short', 'Short-lean'];
  const tL = longSet.includes(tech), tS = shortSet.includes(tech);
  const fL = longSet.includes(fund), fS = shortSet.includes(fund);
  if (tech === 'Long' && fund === 'Long') return { tone: 'emerald', label: 'A+ LONG', detail: 'Both strong long. Trade longs aggressively.' };
  if (tech === 'Short' && fund === 'Short') return { tone: 'rose', label: 'A+ SHORT', detail: 'Both strong short. Trade shorts aggressively.' };
  if (tL && fL) return { tone: 'emerald', label: 'A LONG', detail: 'Both lean long.' };
  if (tS && fS) return { tone: 'rose', label: 'A SHORT', detail: 'Both lean short.' };
  if ((tL && fS) || (tS && fL)) return { tone: 'rose', label: 'CONFLICT', detail: 'Tech & Fund disagree. NO TRADE.' };
  if (tech === 'Neutral' && fund !== 'Neutral') return { tone: 'amber', label: 'FUND ONLY', detail: 'Wait for tech to confirm.' };
  if (fund === 'Neutral' && tech !== 'Neutral') return { tone: 'amber', label: 'TECH ONLY', detail: 'No fundamental tailwind.' };
  return { tone: 'zinc', label: 'NEUTRAL', detail: 'No clear edge.' };
}

// ──────────── Inline SVG icons ────────────
function svg(path, cls) {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls || ''}" style="width:1em;height:1em;display:inline-block;vertical-align:-0.125em;">${path}</svg>`;
}
const ICONS = {
  clock: svg('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'),
  target: svg('<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>'),
  calc: svg('<rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/>'),
  book: svg('<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>'),
  bar: svg('<path d="M3 3v18h18"/><path d="M8 17V9"/><path d="M13 17V5"/><path d="M18 17v-7"/>'),
  shield: svg('<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>'),
  plus: svg('<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>'),
  trash: svg('<polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/>'),
  alert: svg('<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'),

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]);
}

function renderHeader() {
  const now = new Date();
  const phtParts = new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Manila', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).formatToParts(now);
  const get = t => parseInt((phtParts.find(p => p.type === t) || {}).value || '0');
  const h = get('hour'), m = get('minute'), s = get('second');
  const mins = h * 60 + m;
  const session = getSession(mins);
  const phtClock = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const phtDate = now.toLocaleDateString('en-US', { timeZone: 'Asia/Manila', weekday: 'short', month: 'short', day: 'numeric' });

  const pairBias = computeFundamentalBias(state.fundamentals);
  const hasFund = state.fundamentals.length > 0;

  let chipHTML = '';
  if (hasFund) {
    chipHTML = '<button class="fund-chip" onclick="setTab(\'news\')" title="Fundamentals">' + ICONS.news + PAIRS.map(p => {
      const b = pairBias[p];

      const arrow = (b.dir === 'Long' || b.dir === 'Long-lean') ? '▲' : (b.dir === 'Short' || b.dir === 'Short-lean') ? '▼' : '–';
      const cls = (b.dir === 'Long' || b.dir === 'Long-lean') ? 'fund-long' : (b.dir === 'Short' || b.dir === 'Short-lean') ? 'fund-short' : 'fund-neutral';
      return `<span class="fund-tag ${cls}">${short} ${arrow}</span>`;
    }).join('') + '</button>';
  } else {
    chipHTML = '<button class="fund-chip" onclick="setTab(\'news\')" style="color: var(--dim);">' + ICONS.news + '<span style="font-size:0.75rem;">Set Fundamentals</span></button>';
  }

  return `
    <div class="header">
      <div class="container">
        <div class="header-row">

              <span class="dot"></span>${session.name}

  `;

function renderBias() {

        ${PAIRS.map(pair => {
          const b = state.bias[pair] || {};
          let alignTier = null, alignTone = 'zinc', alignText = 'Mark all 3 TFs';
          if (b.daily && b.h4 && b.h1) {
            const v = [b.daily, b.h4, b.h1];
            if (v.every(x => x === 'Bull')) { alignTier = 'A+'; alignTone = 'emerald'; alignText = 'A+ ALIGNED — Hunt longs from discount POI'; }
            else if (v.every(x => x === 'Bear')) { alignTier = 'A+'; alignTone = 'rose'; alignText = 'A+ ALIGNED — Hunt shorts from premium POI'; }
            else {
              const bulls = v.filter(x => x === 'Bull').length, bears = v.filter(x => x === 'Bear').length;
              if (bulls === 2 && bears === 0) { alignTier = 'B'; alignTone = 'amber'; alignText = 'B — Wait for misaligned TF to flip bullish'; }
              else if (bears === 2 && bulls === 0) { alignTier = 'B'; alignTone = 'amber'; alignText = 'B — Wait for misaligned TF to flip bearish'; }
              else { alignTier = 'C'; alignText = 'NO TRADE — Conflicting timeframes'; }
            }
          }
          return `
            <div class="card p-5">
              <div class="flex items-center justify-between mb-4">
                <span class="text-lg font-semibold">${pair}</span>
                ${alignTier ? `<span class="bias-cell bias-${alignTone} text-xs font-bold" style="padding:0.25rem 0.5rem">${alignTier}</span>` : ''}
              </div>
              ${['daily', 'h4', 'h1'].map(tf => {

                  <div class="mt-3">

                      }).join('')}
                    </div>
                  </div>
                `;
              }).join('')}
              <div class="bias-cell bias-${alignTone} mt-4">
                <div class="text-xs uppercase" style="opacity:0.7">Verdict</div>
                <div class="font-semibold mt-1">${alignText}</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;

function renderKillzones() {

  const m = parseInt((phtParts.find(p => p.type === 'minute') || {}).value || '0');
  const mins = h * 60 + m;

  const zones = [
    { name: 'Sydney/Tokyo', start: 5*60, end: 13*60, label: '5:00 AM - 1:00 PM', priority: 'low', note: 'AUD range builds.', pair: 'AUD' },

    { name: 'London Lunch', start: 18*60, end: 20*60+30, label: '6:00 - 8:30 PM', priority: 'low', note: 'Skip unless A+.', pair: 'Caution' },
    { name: 'NY Killzone', start: 20*60+30, end: 23*60, label: '8:30 - 11:00 PM', priority: 'prime', note: 'Sweep + FVG model.', pair: 'All 3' },

    { name: 'NY PM', start: 0, end: 4*60, label: '12:00 - 4:00 AM', priority: 'mid', note: 'Continuation only.', pair: 'XAU + AUD' },

  return `

function renderEntryScore() {
  const score = Object.values(state.scoreChecked).filter(Boolean).length;
  let grade = 'C', gradeColor = 'var(--rose-light)';
  if (score >= 11) { grade = 'A+'; gradeColor = 'var(--emerald-light)'; }
  else if (score >= 9) { grade = 'A'; gradeColor = 'var(--emerald)'; }
  else if (score >= 7) { grade = 'B'; gradeColor = 'var(--amber-light)'; }

  let verdict = 'NO TRADE', verdictColor = 'var(--rose-light)';
  if (score >= 9) { verdict = 'TRADE — full size'; verdictColor = 'var(--emerald-light)'; }
  else if (score >= 7) { verdict = 'SKIP or half size'; verdictColor = 'var(--amber-light)'; }

  return `
    <div class="section">
      <h2>Entry Confluence Scorer</h2>
      <div class="card p-5">
        <div class="flex flex-col gap-2">
          ${CONFLUENCES.map((c, i) => {
            const on = !!state.scoreChecked[i];
            return `
              <button class="score-row ${on ? 'checked' : ''}" onclick="toggleScore(${i})">
                <div class="score-checkbox">${ICONS.check}</div>
                <span class="text-sm">${c}</span>
              </button>
            `;
          }).join('')}
        </div>
      </div>
      <div class="card p-5">
        <div class="flex justify-between flex-wrap gap-4 items-center">
          <div><div class="label">Score</div><div class="text-3xl font-bold">${score}<span class="text-dim text-xl">/12</span></div></div>
          <div><div class="label">Grade</div><div class="text-3xl font-bold" style="color:${gradeColor}">${grade}</div></div>
          <div class="text-right"><div class="label">Verdict</div><div class="text-lg font-semibold" style="color:${verdictColor}">${verdict}</div></div>
        </div>
        <button onclick="resetScore()" class="text-xs text-dim mt-3" style="background:none;border:none">Reset</button>
      </div>
    </div>
  `;
}

function renderRiskCalc() {
  const pair = state.calcPair || 'GBP/USD';
  const slDist = state.calcSL || 20;
  const riskAmt = (state.account * state.risk) / 100;
  const perPip = pair === 'XAU/USD' ? 1 : 10;
  const lots = riskAmt / (slDist * perPip);

  return `
    <div class="section">
      <h2>Position Size Calculator</h2>
      <div class="card p-5">
        <div class="grid md-grid-2 gap-3">
          <div class="input-group"><label>Account ($)</label><input class="input font-mono text-lg" type="number" value="${state.account}" oninput="setAccount(this.value)" /></div>
          <div class="input-group"><label>Risk %</label><input class="input font-mono text-lg" type="number" step="0.25" value="${state.risk}" oninput="setRisk(this.value)" /></div>
          <div class="input-group"><label>Pair</label><select class="input" onchange="setCalcPair(this.value)">${PAIRS.map(p => `<option ${p === pair ? 'selected' : ''}>${p}</option>`).join('')}</select></div>
          <div class="input-group"><label>SL Distance</label><input class="input font-mono text-lg" type="number" value="${slDist}" oninput="setCalcSL(this.value)" /></div>
        </div>
      </div>
      <div class="grid md-grid-3">
        <div class="tile"><div class="tile-label">Risk $</div><div class="tile-value">$${riskAmt.toFixed(2)}</div></div>
        <div class="tile" style="background:rgba(16,185,129,0.05);border-color:rgba(16,185,129,0.3)"><div class="tile-label" style="color:var(--emerald-light)">Position</div><div class="tile-value pos">${lots.toFixed(3)} lots</div></div>
        <div class="tile"><div class="tile-label">Per-Unit</div><div class="tile-value">$${perPip}</div></div>
      </div>

      ${renderRRCalc()}
    </div>
  `;
}

function renderRRCalc() {
  const en = parseFloat(state.rrEntry) || NaN;
  const sl = parseFloat(state.rrSL) || NaN;
  const tp1 = parseFloat(state.rrTP1) || NaN;
  const valid = !isNaN(en) && !isNaN(sl) && en !== sl;
  const slDist = valid ? Math.abs(en - sl) : 0;
  const r1 = valid && !isNaN(tp1) ? Math.abs(tp1 - en) / slDist : 0;

  return `
    <div class="card-emerald banner mt-4">
      <div class="text-emerald font-semibold mb-3 flex items-center gap-2">${ICONS.dollar} R:R Calculator</div>
      <div class="grid md-grid-3 gap-3 mb-3">
        <div class="input-group"><label>Entry</label><input class="input font-mono" type="number" step="0.00001" value="${state.rrEntry || ''}" oninput="setRR('Entry', this.value)" /></div>
        <div class="input-group"><label style="color:var(--rose-light)">SL</label><input class="input font-mono" type="number" step="0.00001" value="${state.rrSL || ''}" oninput="setRR('SL', this.value)" /></div>
        <div class="input-group"><label style="color:var(--emerald-light)">TP1</label><input class="input font-mono" type="number" step="0.00001" value="${state.rrTP1 || ''}" oninput="setRR('TP1', this.value)" /></div>
      </div>
      ${valid ? `
        <div class="grid md-grid-2 gap-3">
          <div class="tile"><div class="tile-label">SL Distance</div><div class="tile-value font-mono">${slDist.toFixed(5)}</div></div>
          <div class="tile" style="background:rgba(16,185,129,0.05);border-color:rgba(16,185,129,0.3)"><div class="tile-label" style="color:var(--emerald-light)">TP1 R:R</div><div class="tile-value font-mono ${r1 >= 2 ? 'pos' : ''}" style="color:${r1 >= 2 ? 'var(--emerald-light)' : 'var(--amber-light)'}">${r1.toFixed(2)}R</div></div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderNews() {
  const links = [
    { name: 'ForexFactory', url: 'https://www.forexfactory.com/calendar' },
    { name: 'Investing.com', url: 'https://www.investing.com/economic-calendar/' },
    { name: 'FXStreet', url: 'https://www.fxstreet.com/economic-calendar' },
    { name: 'MyFXBook', url: 'https://www.myfxbook.com/forex-economic-calendar' },
  ];

  const pairBias = computeFundamentalBias(state.fundamentals);

  return `
    <div class="section">
      <h2>News & Fundamental Calendar</h2>

      <div class="card-rose banner">
        <div class="flex items-start gap-3">
          ${ICONS.alert}
          <div><div class="font-semibold text-rose">Iron Rule</div><div class="text-sm mt-1">No trades 30 min before/after red-folder news.</div></div>
        </div>
      </div>

      <div class="card p-5">
        <div class="font-medium mb-3 flex items-center gap-2 text-sky">${ICONS.ext} Live Calendars</div>
        <div class="grid md-grid-2">
          ${links.map(l => `<a href="${l.url}" target="_blank" rel="noopener" class="card p-4" style="display:block;text-decoration:none;color:inherit"><div class="flex justify-between items-center"><span class="font-semibold">${l.name}</span>${ICONS.ext}</div></a>`).join('')}
        </div>
      </div>

      <div class="card-fuchsia banner">
        <div class="flex justify-between flex-wrap gap-3 mb-3">
          <div>
            <div class="text-fuchsia font-semibold flex items-center gap-2">${ICONS.activity} Fundamental Bias Engine</div>
            <p class="text-xs text-muted mt-1">Log today's events. Tool weights by folder & direction.</p>
          </div>
          <button class="btn btn-emerald" onclick="toggleEventForm()">${ICONS.plus} ${state.showEventForm ? 'Cancel' : 'Add Event'}</button>
        </div>

        ${state.showEventForm ? `
          <div class="card p-4 mb-3">
            <div class="grid md-grid-3 gap-3">
              <div class="input-group"><label>Folder</label><select class="input" id="ef_folder"><option value="red">🔴 Red</option><option value="orange">🟠 Orange</option><option value="yellow">🟡 Yellow</option></select></div>
              <div class="input-group"><label>Currency</label><select class="input" id="ef_currency"><option>USD</option><option>GBP</option><option>AUD</option><option>EUR</option><option>JPY</option><option>XAU</option></select></div>
              <div class="input-group"><label>Direction</label><select class="input" id="ef_direction"><option>Bullish</option><option>Bearish</option><option>Neutral</option></select></div>
              <div class="input-group"><label>Event</label><input class="input" id="ef_name" placeholder="NFP, CPI, BoE..." /></div>
              <div class="input-group"><label>Theme</label><select class="input" id="ef_theme"><option value="normal">Normal</option><option value="risk-off">Risk-Off</option><option value="risk-on">Risk-On</option></select></div>
              <div class="input-group"><label>Notes</label><input class="input" id="ef_notes" /></div>
            </div>
            <button class="btn btn-emerald w-full mt-3" onclick="saveEvent()">Save Event</button>
          </div>
        ` : ''}

        <div class="grid md-grid-3 mb-3">
          ${PAIRS.map(p => {
            const b = pairBias[p];
            const tone = (b.dir === 'Long' || b.dir === 'Long-lean') ? 'emerald' : (b.dir === 'Short' || b.dir === 'Short-lean') ? 'rose' : 'zinc';
            return `
              <div class="bias-cell bias-${tone}">
                <div class="flex justify-between mb-1"><span class="font-semibold">${p}</span><span class="text-xs" style="opacity:0.7">Score: ${b.score >= 0 ? '+' : ''}${b.score.toFixed(1)}</span></div>
                <div class="text-lg font-bold">${b.verdict}</div>
              </div>
            `;
          }).join('')}
        </div>

        ${state.fundamentals.length === 0 ? '<div class="empty-state text-sm">No events logged. Add red/orange/yellow events.</div>' : `
          <div>
            ${state.fundamentals.map(e => `
              <div class="event-card event-folder-${e.folder}">
                <div class="flex justify-between gap-3 flex-wrap">
                  <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                      <span class="tag tag-${e.folder === 'red' ? 'rose' : e.folder === 'orange' ? 'rose' : 'zinc'}">● ${e.folder.toUpperCase()}</span>
                      <span class="tag tag-zinc font-mono">${e.currency}</span>
                      <span class="font-medium">${escapeHtml(e.name)}</span>
                    </div>
                    <select class="input text-xs mt-2" style="width:auto;display:inline-block" onchange="updateEventDir(${e.id}, this.value)">
                      <option ${e.direction === 'Bullish' ? 'selected' : ''}>Bullish</option>
                      <option ${e.direction === 'Bearish' ? 'selected' : ''}>Bearish</option>
                      <option ${e.direction === 'Neutral' ? 'selected' : ''}>Neutral</option>
                    </select>
                  </div>
                  <button onclick="deleteEvent(${e.id})" style="background:none;border:none;color:var(--dim);cursor:pointer">${ICONS.trash}</button>
                </div>
              </div>
            `).join('')}
          </div>
        `}
      </div>
    </div>
  `;
}

function renderJournal() {
  return `
    <div class="section">
      <div class="flex justify-between flex-wrap gap-3">
        <div><h2>Trade Journal</h2><p class="muted">${state.trades.length} trades logged.</p></div>
        <button class="btn btn-emerald" onclick="toggleTradeForm()">${ICONS.plus} ${state.showTradeForm ? 'Cancel' : 'Log Trade'}</button>
      </div>
      ${state.showTradeForm ? `
        <div class="card p-5">
          <div class="grid md-grid-3 gap-3">
            <div class="input-group"><label>Pair</label><select class="input" id="tr_pair">${PAIRS.map(p => `<option>${p}</option>`).join('')}</select></div>
            <div class="input-group"><label>Direction</label><select class="input" id="tr_direction"><option>Long</option><option>Short</option></select></div>
            <div class="input-group"><label>Setup</label><select class="input" id="tr_setup"><option>Judas Reversal</option><option>NY Displacement</option><option>Sydney-Range</option><option>FRVP Breakout</option><option>Other</option></select></div>
            <div class="input-group"><label>Entry</label><input class="input" type="number" step="0.0001" id="tr_entry" /></div>
            <div class="input-group"><label>SL</label><input class="input" type="number" step="0.0001" id="tr_sl" /></div>
            <div class="input-group"><label>TP</label><input class="input" type="number" step="0.0001" id="tr_tp" /></div>
            <div class="input-group"><label>Result</label><select class="input" id="tr_result"><option>Win</option><option>Loss</option><option>BE</option></select></div>
            <div class="input-group"><label>R Multiple</label><input class="input" type="number" step="0.1" id="tr_r" placeholder="2.5 or -1" /></div>
            <div class="input-group"><label>Notes</label><input class="input" id="tr_notes" /></div>
          </div>
          <button class="btn btn-emerald w-full mt-3" onclick="saveTrade()">Save Trade</button>
        </div>
      ` : ''}
      ${state.trades.length === 0 ? `<div class="card p-5 empty-state">${ICONS.target}<div>No trades yet.</div></div>` : `
        <div>
          ${state.trades.map(t => `
            <div class="card p-4 mb-2">
              <div class="flex justify-between gap-3 flex-wrap">
                <div class="flex-1">
                  <div class="flex items-center gap-2 flex-wrap">
                    <span class="font-medium">${t.pair}</span>
                    <span class="tag tag-${t.direction === 'Long' ? 'emerald' : 'rose'}">${t.direction}</span>
                    <span class="tag tag-zinc">${escapeHtml(t.setup)}</span>
                    <span class="text-xs text-dim">${t.date}</span>
                  </div>
                  <div class="flex gap-4 mt-2 text-sm">
                    <span class="font-semibold ${t.result === 'Win' ? 'text-emerald' : t.result === 'Loss' ? 'text-rose' : 'text-muted'}">${t.result} ${t.rResult ? `(${t.rResult > 0 ? '+' : ''}${t.rResult}R)` : ''}</span>
                  </div>
                  ${t.notes ? `<div class="text-sm text-muted mt-2 italic">${escapeHtml(t.notes)}</div>` : ''}
                </div>
                <button onclick="deleteTrade(${t.id})" style="background:none;border:none;color:var(--dim);cursor:pointer">${ICONS.trash}</button>
              </div>
            </div>
          `).join('')}
        </div>
      `}
    </div>
  `;
}

function renderStats() {
  if (!state.trades.length) return `<div class="card p-5 empty-state">${ICONS.bar}<div>Log trades to see stats.</div></div>`;
  const wins = state.trades.filter(t => t.result === 'Win').length;
  const losses = state.trades.filter(t => t.result === 'Loss').length;
  const wr = (wins / state.trades.length) * 100;
  const totalR = state.trades.reduce((s, t) => s + (parseFloat(t.rResult) || 0), 0);

  return `
    <div class="section">
      <h2>Performance Stats</h2>
      <div class="grid md-grid-4">
        <div class="tile"><div class="tile-label">Total</div><div class="tile-value">${state.trades.length}</div></div>
        <div class="tile"><div class="tile-label">Win Rate</div><div class="tile-value ${wr >= 50 ? 'pos' : 'neg'}">${wr.toFixed(1)}%</div></div>
        <div class="tile"><div class="tile-label">Total R</div><div class="tile-value ${totalR >= 0 ? 'pos' : 'neg'}">${totalR > 0 ? '+' : ''}${totalR.toFixed(2)}R</div></div>
        <div class="tile"><div class="tile-label">Wins/Losses</div><div class="tile-value">${wins}/${losses}</div></div>
      </div>
    </div>
  `;
}

function renderActiveZones() {
  return `
    <div class="section">
      <h2>Active Zones — Sniper Watchlist</h2>
      <p class="muted">Coming soon. Use the Journal tab for now.</p>
    </div>
  `;
}

function renderCheatSheet() {
  const today = new Date().toLocaleDateString('en-US', { timeZone: 'Asia/Manila', weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  return `
    <div class="section">
      <div class="flex justify-between flex-wrap no-print">
        <div><h2>Daily Bias Cheat Sheet</h2><p class="muted">Print or save as PDF.</p></div>
        <button class="btn btn-emerald" onclick="window.print()">${ICONS.printer} Print</button>
      </div>
      <div class="card p-5 printable" style="background:white;color:black">
        <div class="border-b mb-3">
          <div class="flex justify-between"><span class="text-2xl font-bold" style="color:black">SNIPER DESK</span><span class="text-xs" style="color:#666">${today}</span></div>
          <div class="text-xs" style="color:#666">GBP/USD · XAU/USD · AUD/USD · ICT/SMC · PHT</div>
        </div>
        <div class="mb-4"><div class="font-bold uppercase mb-2">1. Daily Bias (mark before 8 AM)</div>
          <table style="border:1px solid #999"><thead><tr style="background:#f0f0f0"><th style="border:1px solid #999;padding:0.25rem">Pair</th><th style="border:1px solid #999;padding:0.25rem">Daily</th><th style="border:1px solid #999;padding:0.25rem">4H</th><th style="border:1px solid #999;padding:0.25rem">1H</th><th style="border:1px solid #999;padding:0.25rem">Tier</th></tr></thead>
          <tbody>${PAIRS.map(p => `<tr><td style="border:1px solid #999;padding:0.5rem;font-weight:bold">${p}</td><td style="border:1px solid #999"></td><td style="border:1px solid #999"></td><td style="border:1px solid #999"></td><td style="border:1px solid #999"></td></tr>`).join('')}</tbody></table>
        </div>
        <div class="mb-4"><div class="font-bold uppercase mb-2">2. Killzones (PHT)</div>
          <div class="grid grid-3 text-xs"><div><strong>London KZ:</strong> 3:00-6:00 PM</div><div><strong>NY KZ:</strong> 8:30-11:00 PM</div><div><strong>Overlap:</strong> 11 PM-12 AM</div></div>
        </div>
        <div><div class="font-bold uppercase mb-2">3. Non-Negotiables</div>
          <ol class="text-xs">${RULES.slice(0, 5).map(r => `<li>${r}</li>`).join('')}</ol>
        </div>
      </div>
    </div>
  `;
}

function renderRules() {
  return `
    <div class="section">
      <h2>Edge Rules — Lockdown</h2>
      <div class="card-emerald banner">
        <div class="flex items-center gap-2 mb-3">${ICONS.shield}<span class="text-lg font-semibold">Non-Negotiables</span></div>
        <ol>${RULES.map(r => `<li class="text-sm mb-2">${r}</li>`).join('')}</ol>
      </div>
    </div>
  `;
}

// ──────────── Main render ────────────
function render() {
  const root = document.getElementById('root');
  let body = '';
  switch (state.tab) {
    case 'dash': body = renderDashboard(); break;
    case 'bias': body = renderBias(); break;
    case 'play': body = renderPlaybook(); break;
    case 'fib': body = renderFibs(); break;
    case 'kz': body = renderKillzones(); break;
    case 'zones': body = renderActiveZones(); break;
    case 'score': body = renderEntryScore(); break;
    case 'calc': body = renderRiskCalc(); break;
    case 'news': body = renderNews(); break;
    case 'journal': body = renderJournal(); break;
    case 'stats': body = renderStats(); break;
    case 'sheet': body = renderCheatSheet(); break;
    case 'rules': body = renderRules(); break;
  }
  root.innerHTML = renderHeader() + '<div class="main"><div class="container">' + body + '</div></div>' +
    '<footer>Educational tool. Not financial advice. Trade your plan, log every trade, respect your stops.</footer>';
}

// ──────────── Event handlers (global) ────────────
window.setTab = function(t) { state.tab = t; render(); };
window.setBias = function(pair, tf, val) {
  if (!state.bias[pair]) state.bias[pair] = {};
  state.bias[pair][tf] = val;
  lsSet('sd_bias_' + todayKey(), state.bias);
  render();
};
window.toggleScore = function(i) {
  state.scoreChecked[i] = !state.scoreChecked[i];
  render();
};
window.resetScore = function() { state.scoreChecked = {}; render(); };
window.setAccount = function(v) { state.account = parseFloat(v) || 0; lsSet('sd_account', state.account); render(); };
window.setRisk = function(v) { state.risk = parseFloat(v) || 0; lsSet('sd_risk', state.risk); render(); };
window.setCalcPair = function(v) { state.calcPair = v; render(); };
window.setCalcSL = function(v) { state.calcSL = parseFloat(v) || 0; render(); };
window.setRR = function(field, v) { state['rr' + field] = v; render(); };

window.toggleEventForm = function() { state.showEventForm = !state.showEventForm; render(); };
window.saveEvent = function() {
  const name = document.getElementById('ef_name').value.trim();
  if (!name) return;
  const ev = {
    id: Date.now(),
    folder: document.getElementById('ef_folder').value,
    currency: document.getElementById('ef_currency').value,
    direction: document.getElementById('ef_direction').value,
    name: name,
    theme: document.getElementById('ef_theme').value,
    notes: document.getElementById('ef_notes').value,
  };
  state.fundamentals.unshift(ev);
  lsSet('sd_fund_' + todayKey(), state.fundamentals);
  state.showEventForm = false;
  render();
};
window.updateEventDir = function(id, dir) {
  const e = state.fundamentals.find(x => x.id === id);
  if (e) { e.direction = dir; lsSet('sd_fund_' + todayKey(), state.fundamentals); render(); }
};
window.deleteEvent = function(id) {
  state.fundamentals = state.fundamentals.filter(e => e.id !== id);
  lsSet('sd_fund_' + todayKey(), state.fundamentals);
  render();
};

window.toggleTradeForm = function() { state.showTradeForm = !state.showTradeForm; render(); };
window.saveTrade = function() {
  const tr = {
    id: Date.now(),
    timestamp: Date.now(),
    pair: document.getElementById('tr_pair').value,
    direction: document.getElementById('tr_direction').value,
    setup: document.getElementById('tr_setup').value,
    entry: parseFloat(document.getElementById('tr_entry').value) || 0,
    sl: parseFloat(document.getElementById('tr_sl').value) || 0,
    tp: parseFloat(document.getElementById('tr_tp').value) || 0,
    result: document.getElementById('tr_result').value,
    rResult: parseFloat(document.getElementById('tr_r').value) || 0,
    notes: document.getElementById('tr_notes').value,
    date: new Date().toLocaleDateString('en-US', { timeZone: 'Asia/Manila', month: 'short', day: 'numeric' }),
  };
  state.trades.unshift(tr);
  lsSet('sd_trades', state.trades);
  state.showTradeForm = false;
  render();
};
window.deleteTrade = function(id) {
  state.trades = state.trades.filter(t => t.id !== id);
  lsSet('sd_trades', state.trades);
  render();
};

// Init
loadState();
render();
setInterval(() => {
  if (state.tab === 'dash' || state.tab === 'kz') render();
}, 1000);
</script>
</body>
</html>
